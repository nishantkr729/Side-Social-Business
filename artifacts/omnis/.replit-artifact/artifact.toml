kind = "web"
previewPath = "/"
title = "Omnis"
version = "1.0.0"
id = "artifacts/omnis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23249

[services.development]
run = "pnpm --filter @workspace/omnis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omnis", "run", "build" ]
publicDir = "artifacts/omnis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23249"
BASE_PATH = "/"
